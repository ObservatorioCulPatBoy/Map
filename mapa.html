<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Eventos Culturales de Boyacá</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- Tus estilos personalizados -->
  <link rel="stylesheet" href="maps.css" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      box-sizing: border-box;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .top-section {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    #map {
      flex: 3;
      min-height: 55vh;
      border: 1px solid #ccc;
    }

    #sidebar {
      flex: 1;
      padding: 1rem;
      max-width: 300px;
      background-color: #fff;
      border-left: 1px solid #ccc;
    }

    .filter-group {
      margin-bottom: 1em;
    }

    #btn-limpiar {
      margin-top: 1em;
      padding: 8px 16px;
      width: 100%;
      background-color: #d9534f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    #btn-limpiar:hover {
      background-color: #c9302c;
    }

    #top-filters {
      padding: 0.5rem 1rem;
      background-color: #f7f7f7;
      border-bottom: 1px solid #ddd;
    }

    #top-filters label {
      font-weight: bold;
    }

    #f-mes {
      padding: 5px;
      width: 200px;
      margin-left: 10px;
    }

    .tabla-container {
      overflow-y: auto;
      max-height: 40vh;
      padding: 1rem;
      background: #f9f9f9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 8px;
      background: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    th {
      background-color: #0077b6;
      color: white;
      text-transform: uppercase;
    }

    td,
    th {
      padding: 10px;
      font-size: 14px;
      text-align: left;
    }

    @media screen and (max-width: 768px) {
      .top-section {
        flex-direction: column;
      }

      #sidebar {
        max-width: 100%;
        border-left: none;
        border-top: 1px solid #ccc;
      }

      #map {
        height: 300px;
      }

      td,
      th {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Filtro horizontal de mes -->
    <div id="top-filters">
      <label for="f-mes">Mes:</label>
      <select id="f-mes">
        <option value="">— Todos —</option>
      </select>
    </div>

    <!-- Mapa y filtros -->
    <div class="top-section">
      <div id="map"></div>

      <div id="sidebar">
        <h2>Filtros</h2>

        <div class="filter-group">
          <label for="f-provincia">Provincia:</label>
          <select id="f-provincia">
            <option value="">— Todas —</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="f-municipio">Municipio:</label>
          <select id="f-municipio">
            <option value="">— Todos —</option>
          </select>
        </div>

        <button id="btn-limpiar">🗑 Limpiar filtros</button>
      </div>
    </div>

    <!-- Tabla de eventos -->
    <div class="tabla-container">
      <h3>Lista de eventos</h3>
      <table id="tabla-eventos">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Evento</th>
            <th>Tipo de Evento</th>
            <th>Línea/Subcategoría</th>
            <th>Municipio</th>
          </tr>
        </thead>
        <tbody>
          <!-- contenido dinámico por JS -->
        </tbody>
      </table>
    </div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- GeoJSON -->
  <script src="boyaca_low.js"></script>
  <!-- Lógica del mapa -->
  <script src="mapa.js"></script>
</body>

</html>
